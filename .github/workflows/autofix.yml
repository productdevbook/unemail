name: autofix.ci
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - '!scripts/**'

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install

      - name: Fix lint issues
        run: pnpm lint:fix

      - uses: autofix-ci/action@v1
        with:
          commit-message: 'fix: lint issues'
